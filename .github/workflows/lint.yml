name: Lint

on:
  pull_request:
    branches: ["main", "master", "development", "develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint -- --format=github
