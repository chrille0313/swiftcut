name: Deploy Supabase

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/**"

concurrency:
  group: deploy-supabase-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Add any env() references from supabase/config.toml here, e.g.:
      # SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      # SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
      # SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Push config
        run: supabase config push

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy
